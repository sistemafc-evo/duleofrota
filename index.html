<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>FrotaTrack - Gerenciamento de Frotas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="index.css">
    
    <!-- PWA Manifest inline -->
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22FrotaTrack%22%2C%22short_name%22%3A%22FrotaTrack%22%2C%22start_url%22%3A%22%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23667eea%22%2C%22theme_color%22%3A%22%23667eea%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data:image/svg+xml%2C%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ccircle%20cx%3D%2250%22%20cy%3D%2250%22%20r%3D%2250%22%20fill%3D%22%23667eea%22%2F%3E%3Ctext%20x%3D%2250%22%20y%3D%2270%22%20font-size%3D%2270%22%20text-anchor%3D%22middle%22%20fill%3D%22white%22%3E%F0%9F%9A%9B%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
    
    <!-- Service Worker inline -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:application/javascript,' + encodeURIComponent(`
                const CACHE_NAME = 'frotatrack-v1';
                const urlsToCache = [
                    '/',
                    '/index.html',
                    '/index.css',
                    '/index.js',
                    'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css'
                ];

                self.addEventListener('install', event => {
                    event.waitUntil(
                        caches.open(CACHE_NAME)
                            .then(cache => cache.addAll(urlsToCache))
                    );
                });

                self.addEventListener('fetch', event => {
                    event.respondWith(
                        caches.match(event.request)
                            .then(response => response || fetch(event.request))
                    );
                });

                self.addEventListener('activate', event => {
                    event.waitUntil(
                        caches.keys().then(cacheNames => {
                            return Promise.all(
                                cacheNames.map(cacheName => {
                                    if (cacheName !== CACHE_NAME) {
                                        return caches.delete(cacheName);
                                    }
                                })
                            );
                        })
                    );
                });
            `), { scope: '/' }).catch(err => console.log('Service Worker erro:', err));
        }
    </script>
</head>
<body>
    <div id="app">
        <!-- Tela de Login -->
        <div id="login-screen" class="screen active">
            <div class="login-container">
                <div class="logo">
                    <i class="fas fa-truck"></i>
                    <h1>FrotaTrack</h1>
                </div>
                <div class="login-form">
                    <h2>Acesso ao Sistema</h2>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" placeholder="Usuário" value="motorista_teste">
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Senha" value="123456">
                    </div>
                    <button id="login-btn" class="btn-primary">Entrar</button>
                    <div class="login-info">
                        <p><strong>Motorista:</strong> motorista_teste / 123456</p>
                        <p><strong>Gestor:</strong> gestor_teste / 123456</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tela do Motorista -->
        <div id="motorista-screen" class="screen">
            <div class="header">
                <div class="header-title">
                    <i class="fas fa-truck"></i>
                    <h2>Painel do Motorista</h2>
                </div>
                <div class="user-info">
                    <span id="motorista-nome">Motorista</span>
                    <button id="motorista-logout" class="btn-icon"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
            
            <div class="content">
                <!-- GPS Status -->
                <div class="gps-status" id="gps-status">
                    <i class="fas fa-satellite-dish"></i>
                    <span>Aguardando GPS...</span>
                </div>

                <!-- Formulário de Novo Frete -->
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-plus-circle"></i> Novo Frete</h3>
                    </div>
                    <div class="card-body">
                        <form id="frete-form">
                            <div class="form-group">
                                <label><i class="fas fa-map-marker-alt"></i> Ponto de Origem</label>
                                <input type="text" id="origem" placeholder="Digite o endereço de origem" required>
                                <button type="button" class="btn-gps" id="get-origem-gps"><i class="fas fa-location-arrow"></i> Usar localização atual</button>
                            </div>
                            
                            <div class="form-group">
                                <label><i class="fas fa-flag"></i> Ponto de Partida</label>
                                <input type="text" id="partida" placeholder="Local de partida" required>
                            </div>
                            
                            <div class="form-group">
                                <label><i class="fas fa-map-pin"></i> Ponto de Entrega</label>
                                <input type="text" id="entrega" placeholder="Endereço de entrega" required>
                            </div>
                            
                            <div class="form-row">
                                <div class="form-group half">
                                    <label><i class="fas fa-weight-hanging"></i> Peso (kg)</label>
                                    <input type="number" id="peso" placeholder="Ex: 5000" required>
                                </div>
                                <div class="form-group half">
                                    <label><i class="fas fa-boxes"></i> Quantidade de Itens</label>
                                    <input type="number" id="itens" placeholder="Ex: 50" required>
                                </div>
                            </div>
                            
                            <div class="form-row">
                                <div class="form-group half">
                                    <label><i class="fas fa-gas-pump"></i> Combustível (L)</label>
                                    <input type="number" id="combustivel" placeholder="Estimado" readonly>
                                </div>
                                <div class="form-group half">
                                    <label><i class="fas fa-road"></i> Distância (km)</label>
                                    <input type="text" id="distancia" placeholder="0 km" readonly>
                                </div>
                            </div>
                            
                            <button type="submit" class="btn-primary btn-block">
                                <i class="fas fa-save"></i> Salvar Frete
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Lista de Fretes do Motorista -->
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-list"></i> Meus Fretes</h3>
                    </div>
                    <div class="card-body">
                        <div id="fretes-list" class="fretes-list">
                            <!-- Fretes serão carregados aqui -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tela do Gestor -->
        <div id="gestor-screen" class="screen">
            <div class="header">
                <div class="header-title">
                    <i class="fas fa-chart-line"></i>
                    <h2>Painel do Gestor</h2>
                </div>
                <div class="user-info">
                    <span id="gestor-nome">Gestor</span>
                    <button id="gestor-logout" class="btn-icon"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
            
            <div class="content">
                <!-- Cards de Resumo -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <i class="fas fa-truck"></i>
                        <div class="stat-info">
                            <span class="stat-value" id="total-fretes">0</span>
                            <span class="stat-label">Total de Fretes</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-road"></i>
                        <div class="stat-info">
                            <span class="stat-value" id="total-km">0</span>
                            <span class="stat-label">KM Total</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-weight-hanging"></i>
                        <div class="stat-info">
                            <span class="stat-value" id="total-peso">0</span>
                            <span class="stat-label">Peso Total (kg)</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-gas-pump"></i>
                        <div class="stat-info">
                            <span class="stat-value" id="total-combustivel">0</span>
                            <span class="stat-label">Combustível (L)</span>
                        </div>
                    </div>
                </div>

                <!-- Filtros -->
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-filter"></i> Filtros</h3>
                    </div>
                    <div class="card-body">
                        <div class="filter-row">
                            <input type="text" id="filter-motorista" placeholder="Filtrar por motorista">
                            <input type="date" id="filter-data">
                            <button id="filter-btn" class="btn-primary">Filtrar</button>
                        </div>
                    </div>
                </div>

                <!-- Lista de Todos os Fretes -->
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-clipboard-list"></i> Todos os Fretes</h3>
                    </div>
                    <div class="card-body">
                        <div id="todos-fretes-list" class="fretes-list">
                            <!-- Todos os fretes serão carregados aqui -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="index.js"></script>
</body>
</html>
