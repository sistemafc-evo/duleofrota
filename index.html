<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>FrotaTrack</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- CSS customizado -->
    <link rel="stylesheet" href="css/custom.css">
</head>
<body>

    <div id="app"></div>

    <!-- Template Operador (Motorista) -->
    <template id="template-operador">
        <div class="bg-gradient-primary px-4 py-3 text-white sticky-top">
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center">
                    <img src="imagens/logo.png" alt="Logo" style="width: 32px; height: 32px; object-fit: contain;" class="me-2">
                    <span class="fw-semibold" id="operador-nome">Operador</span>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <span class="badge bg-white bg-opacity-20 text-white px-3 py-2 rounded-pill" id="tela-atual">
                        <i class="fas fa-road me-1"></i>Viagens
                    </span>
                    <div class="dropdown">
                        <button class="btn btn-sm bg-opacity-20 border-0 text-white" type="button" data-bs-toggle="dropdown">
                            <i class="fas fa-ellipsis-vertical fs-5"></i>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end" id="menu-opcoes"></ul>
                    </div>
                </div>
            </div>
        </div>
        <div id="tela-container" class="px-3 py-3"></div>
    </template>

        <!-- Container das telas -->
        <div id="tela-container" class="px-3 py-3">
            <!-- O conteúdo será carregado aqui dinamicamente -->
        </div>
    </template>

    <!-- Template Motorista (mantido para compatibilidade) -->
    <template id="template-motorista">
        <!-- Header com menu -->
        <div class="bg-gradient-primary px-4 py-3 text-white sticky-top">
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center">
                    <img src="imagens/logo.png" alt="Logo" style="width: 32px; height: 32px; object-fit: contain;" class="me-2">
                    <span class="fw-semibold" id="motorista-nome">Motorista</span>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <!-- Badge da tela atual -->
                    <span class="badge bg-white bg-opacity-20 text-white px-3 py-2 rounded-pill" id="tela-atual">
                        <i class="fas fa-road me-1"></i>Viagens
                    </span>
                    <!-- Menu de 3 pontinhos -->
                    <div class="dropdown">
                        <button class="btn btn-sm bg-opacity-20 border-0 text-white" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="fas fa-ellipsis-vertical fs-5"></i>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end" id="menu-opcoes">
                            <!-- Itens serão inseridos via JavaScript -->
                        </ul>
                    </div>
                </div>
            </div>
        </div>

        <!-- Container das telas -->
        <div id="tela-container" class="px-3 py-3">
            <!-- O conteúdo será carregado aqui dinamicamente -->
        </div>
    </template>

    <!-- Template Tela Viagens -->
    <template id="template-tela-viagens">
        <!-- GPS Status -->
        <div class="alert alert-warning d-flex align-items-center small py-2 mb-3" id="gps-status" role="alert">
            <i class="fas fa-satellite-dish me-2"></i>
            <span>Aguardando GPS...</span>
        </div>

        <!-- Card Novo Frete -->
        <div class="card border-0 shadow-sm rounded-4 mb-3">
            <div class="card-body p-3">
                <h6 class="card-title text-primary fw-semibold mb-3">
                    <i class="fas fa-plus-circle me-2"></i>Novo Frete
                </h6>
                
                <form id="frete-form">
                    <!-- Localização atual -->
                    <div class="mb-2">
                        <div class="d-flex align-items-center gap-1 mb-1">
                            <label class="form-label small text-secondary mb-0">ONDE ESTOU</label>
                            <i class="fas fa-question-circle text-primary small" 
                            data-bs-toggle="popover"
                            data-bs-trigger="click"
                            data-bs-placement="top"
                            data-bs-title="Localização Atual"
                            data-bs-content="Sua localização atual obtida automaticamente pelo GPS."></i>
                        </div>
                        <div class="d-flex gap-2">
                            <input type="text" class="form-control form-control-sm bg-light" id="origem" readonly>
                            <button type="button" class="btn btn-outline-primary btn-sm" id="view-origem-map">
                                <i class="fas fa-map"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Carregamento -->
                    <div class="input-highlight mb-2">
                        <label>CARREGAR</label>
                        <div class="d-flex gap-2">
                            <input type="text" id="partida" placeholder="Endereço de carregamento" required>
                            <button class="btn btn-outline-secondary" type="button" id="search-partida">
                                <i class="fas fa-search"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Descarregamento -->
                    <div class="input-highlight mb-3">
                        <label>DESCARREGAR</label>
                        <div class="d-flex gap-2">
                            <input type="text" id="entrega" placeholder="Endereço de descarregamento" required>
                            <button class="btn btn-outline-secondary" type="button" id="search-entrega">
                                <i class="fas fa-search"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Toneladas e Valor -->
                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <div class="input-highlight">
                                <div class="d-flex align-items-center justify-content-between mb-1">
                                    <label>TONELADAS (t)</label>
                                    <i class="fas fa-question-circle text-primary" 
                                       data-bs-toggle="popover"
                                       data-bs-trigger="click"
                                       data-bs-placement="top"
                                       data-bs-title="Peso da Carga"
                                       data-bs-content="Informe o peso total em toneladas."></i>
                                </div>
                                <input type="number" id="peso" placeholder="Ex: 5.5" step="0.1" min="0" required>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="input-highlight">
                                <div class="d-flex align-items-center justify-content-between mb-1">
                                    <label>VALOR/t (R$)</label>
                                    <i class="fas fa-question-circle text-primary"
                                       data-bs-toggle="popover"
                                       data-bs-trigger="click"
                                       data-bs-placement="top"
                                       data-bs-title="Valor por Tonelada"
                                       data-bs-content="Valor do frete por tonelada."></i>
                                </div>
                                <input type="number" id="valorPorTonelada" placeholder="Ex: 150" step="0.01" min="0" required>
                            </div>
                        </div>
                    </div>

                    <!-- Cálculo dos trechos -->
                    <div class="bg-light rounded-3 p-2 mb-3">
                        <!-- 1º Trecho -->
                        <div class="trecho-item first">
                            <div class="trecho-header">
                                <i class="fas fa-circle"></i>
                                <span>1° TRECHO (Onde Estou → Carregar)</span>
                                <span class="trecho-badge primeiro ms-2">
                                    <i class="fas fa-truck"></i> Início
                                </span>
                            </div>
                            <div class="trecho-valores">
                                <div class="trecho-valor-item">
                                    <div class="label"><i class="fas fa-road"></i>Distância</div>
                                    <div class="value"><span id="distancia_trecho1">0</span> <small>km</small></div>
                                </div>
                                <div class="trecho-valor-item">
                                    <div class="label"><i class="fas fa-dollar-sign"></i>Valor</div>
                                    <div class="value"><span id="valor_trecho1">R$ 0,00</span></div>
                                </div>
                            </div>
                        </div>
                    
                        <div class="trecho-divider"></div>
                    
                        <!-- 2º Trecho -->
                        <div class="trecho-item second">
                            <div class="trecho-header">
                                <i class="fas fa-circle"></i>
                                <span>2° TRECHO (Carregar → Descarregar)</span>
                                <span class="trecho-badge segundo ms-2">
                                    <i class="fas fa-flag-checkered"></i> Final
                                </span>
                            </div>
                            <div class="trecho-valores">
                                <div class="trecho-valor-item">
                                    <div class="label"><i class="fas fa-road"></i>Distância</div>
                                    <div class="value"><span id="distancia_trecho2">0</span> <small>km</small></div>
                                </div>
                                <div class="trecho-valor-item">
                                    <div class="label"><i class="fas fa-dollar-sign"></i>Valor</div>
                                    <div class="value"><span id="valor_trecho2">R$ 0,00</span></div>
                                </div>
                            </div>
                        </div>
                    
                        <!-- Totais -->
                        <div class="totais-container mt-3">
                            <div class="totais-grid">
                                <div class="total-item">
                                    <div class="label"><i class="fas fa-road"></i>Distância Total</div>
                                    <div class="value"><span id="distancia_total">0</span> <small>km</small></div>
                                </div>
                                <div class="total-item">
                                    <div class="label"><i class="fas fa-gas-pump"></i>Combustível</div>
                                    <div class="value"><span id="combustivel">0</span> <small>L</small></div>
                                </div>
                            </div>
                            <div class="valor-total-destaque">
                                <span class="label"><i class="fas fa-calculator"></i>VALOR TOTAL</span>
                                <span class="valor" id="valorTotal">R$ 0,00</span>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="fas fa-save me-2"></i>Salvar Frete
                    </button>
                </form>
            </div>
        </div>

        <!-- Meus Fretes -->
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-3">
                <h6 class="card-title text-primary fw-semibold mb-3">
                    <i class="fas fa-list me-2"></i>Meus Fretes
                </h6>
                <div id="fretes-list" class="list-fretes"></div>
            </div>
        </div>
    </template>

    <!-- Template Tela Manutenção -->
    <template id="template-tela-manutencao">
        <div class="mb-3">
            <div class="alert alert-info d-flex align-items-center small py-2 mb-3" role="alert">
                <i class="fas fa-clipboard-list me-2"></i>
                <span>Registre as manutenções realizadas no veículo</span>
            </div>
        </div>

        <!-- Card de Manutenção -->
        <div class="card border-0 shadow-sm rounded-4 mb-3">
            <div class="card-body p-3">
                <h6 class="card-title text-primary fw-semibold mb-3">
                    <i class="fas fa-tools me-2"></i>Registrar Manutenção
                </h6>
                
                <form id="manutencao-form">
                    <!-- Data da Manutenção -->
                    <div class="input-highlight mb-3">
                        <div class="d-flex align-items-center justify-content-between mb-1">
                            <label><i class="fas fa-calendar-alt me-1"></i> DATA DA MANUTENÇÃO</label>
                            <i class="fas fa-question-circle text-primary" 
                               data-bs-toggle="popover"
                               data-bs-trigger="click"
                               data-bs-placement="top"
                               data-bs-title="Data da Manutenção"
                               data-bs-content="Informe a data em que a manutenção foi realizada"></i>
                        </div>
                        <input type="date" id="data-manutencao" required>
                    </div>

                    <!-- Quilometragem Atual -->
                    <div class="input-highlight mb-3">
                        <div class="d-flex align-items-center justify-content-between mb-1">
                            <label><i class="fas fa-tachometer-alt me-1"></i> QUILOMETRAGEM (km)</label>
                            <i class="fas fa-question-circle text-primary" 
                               data-bs-toggle="popover"
                               data-bs-trigger="click"
                               data-bs-placement="top"
                               data-bs-title="Quilometragem Atual"
                               data-bs-content="Informe a quilometragem do veículo no momento da manutenção"></i>
                        </div>
                        <input type="number" id="km-manutencao" placeholder="Ex: 45.230" step="1" min="0" required>
                    </div>

                    <!-- Separador -->
                    <div class="border-bottom my-3"></div>
                    <h6 class="text-secondary fw-semibold mb-3">
                        <i class="fas fa-oil-can me-2"></i>Óleos
                    </h6>

                    <!-- Óleo do Motor -->
                    <div class="manutencao-item mb-3">
                        <div class="d-flex align-items-center justify-content-between mb-2">
                            <div class="d-flex align-items-center gap-2">
                                <i class="fas fa-oil-can text-primary"></i>
                                <strong>Óleo do Motor</strong>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="troca-oleo-motor" data-item="oleo-motor">
                                <label class="form-check-label small" for="troca-oleo-motor">Trocar</label>
                            </div>
                        </div>
                        <div id="campos-oleo-motor" class="campos-troca" style="display: none;">
                            <div class="row g-2">
                                <div class="col-6">
                                    <div class="campo-troca">
                                        <label><i class="fas fa-calendar-alt me-1"></i> Data da Troca</label>
                                        <input type="date" id="data-oleo-motor" class="data-troca">
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="campo-troca">
                                        <label><i class="fas fa-tachometer-alt me-1"></i> Km da Troca</label>
                                        <input type="number" id="km-oleo-motor" class="km-troca" placeholder="km">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Óleo do Câmbio -->
                    <div class="manutencao-item mb-3">
                        <div class="d-flex align-items-center justify-content-between mb-2">
                            <div class="d-flex align-items-center gap-2">
                                <i class="fas fa-cogs text-primary"></i>
                                <strong>Óleo do Câmbio</strong>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="troca-oleo-cambio" data-item="oleo-cambio">
                                <label class="form-check-label small" for="troca-oleo-cambio">Trocar</label>
                            </div>
                        </div>
                        <div id="campos-oleo-cambio" class="campos-troca" style="display: none;">
                            <div class="row g-2">
                                <div class="col-6">
                                    <div class="campo-troca">
                                        <label><i class="fas fa-calendar-alt me-1"></i> Data da Troca</label>
                                        <input type="date" id="data-oleo-cambio" class="data-troca">
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="campo-troca">
                                        <label><i class="fas fa-tachometer-alt me-1"></i> Km da Troca</label>
                                        <input type="number" id="km-oleo-cambio" class="km-troca" placeholder="km">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Óleo do Diferencial -->
                    <div class="manutencao-item mb-3">
                        <div class="d-flex align-items-center justify-content-between mb-2">
                            <div class="d-flex align-items-center gap-2">
                                <i class="fas fa-differential text-primary"></i>
                                <strong>Óleo do Diferencial</strong>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="troca-oleo-diferencial" data-item="oleo-diferencial">
                                <label class="form-check-label small" for="troca-oleo-diferencial">Trocar</label>
                            </div>
                        </div>
                        <div id="campos-oleo-diferencial" class="campos-troca" style="display: none;">
                            <div class="row g-2">
                                <div class="col-6">
                                    <div class="campo-troca">
                                        <label><i class="fas fa-calendar-alt me-1"></i> Data da Troca</label>
                                        <input type="date" id="data-oleo-diferencial" class="data-troca">
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="campo-troca">
                                        <label><i class="fas fa-tachometer-alt me-1"></i> Km da Troca</label>
                                        <input type="number" id="km-oleo-diferencial" class="km-troca" placeholder="km">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Separador Filtros -->
                    <div class="border-bottom my-3"></div>
                    <h6 class="text-secondary fw-semibold mb-3">
                        <i class="fas fa-filter me-2"></i>Filtros
                    </h6>

                    <!-- Filtro do Motor -->
                    <div class="manutencao-item mb-3">
                        <div class="d-flex align-items-center justify-content-between mb-2">
                            <div class="d-flex align-items-center gap-2">
                                <i class="fas fa-oil-can text-primary"></i>
                                <strong>Filtro do Motor</strong>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="troca-filtro-motor" data-item="filtro-motor">
                                <label class="form-check-label small" for="troca-filtro-motor">Trocar</label>
                            </div>
                        </div>
                        <div id="campos-filtro-motor" class="campos-troca" style="display: none;">
                            <div class="row g-2">
                                <div class="col-6">
                                    <div class="campo-troca">
                                        <label><i class="fas fa-calendar-alt me-1"></i> Data da Troca</label>
                                        <input type="date" id="data-filtro-motor" class="data-troca">
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="campo-troca">
                                        <label><i class="fas fa-tachometer-alt me-1"></i> Km da Troca</label>
                                        <input type="number" id="km-filtro-motor" class="km-troca" placeholder="km">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Filtro do Diesel -->
                    <div class="manutencao-item mb-3">
                        <div class="d-flex align-items-center justify-content-between mb-2">
                            <div class="d-flex align-items-center gap-2">
                                <i class="fas fa-gas-pump text-primary"></i>
                                <strong>Filtro do Diesel</strong>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="troca-filtro-diesel" data-item="filtro-diesel">
                                <label class="form-check-label small" for="troca-filtro-diesel">Trocar</label>
                            </div>
                        </div>
                        <div id="campos-filtro-diesel" class="campos-troca" style="display: none;">
                            <div class="row g-2">
                                <div class="col-6">
                                    <div class="campo-troca">
                                        <label><i class="fas fa-calendar-alt me-1"></i> Data da Troca</label>
                                        <input type="date" id="data-filtro-diesel" class="data-troca">
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="campo-troca">
                                        <label><i class="fas fa-tachometer-alt me-1"></i> Km da Troca</label>
                                        <input type="number" id="km-filtro-diesel" class="km-troca" placeholder="km">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Filtro de Ar -->
                    <div class="manutencao-item mb-3">
                        <div class="d-flex align-items-center justify-content-between mb-2">
                            <div class="d-flex align-items-center gap-2">
                                <i class="fas fa-wind text-primary"></i>
                                <strong>Filtro de Ar</strong>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="troca-filtro-ar" data-item="filtro-ar">
                                <label class="form-check-label small" for="troca-filtro-ar">Trocar</label>
                            </div>
                        </div>
                        <div id="campos-filtro-ar" class="campos-troca" style="display: none;">
                            <div class="row g-2">
                                <div class="col-6">
                                    <div class="campo-troca">
                                        <label><i class="fas fa-calendar-alt me-1"></i> Data da Troca</label>
                                        <input type="date" id="data-filtro-ar" class="data-troca">
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="campo-troca">
                                        <label><i class="fas fa-tachometer-alt me-1"></i> Km da Troca</label>
                                        <input type="number" id="km-filtro-ar" class="km-troca" placeholder="km">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Filtro P.U. -->
                    <div class="manutencao-item mb-3">
                        <div class="d-flex align-items-center justify-content-between mb-2">
                            <div class="d-flex align-items-center gap-2">
                                <i class="fas fa-filter text-primary"></i>
                                <strong>Filtro P.U.</strong>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="troca-filtro-pu" data-item="filtro-pu">
                                <label class="form-check-label small" for="troca-filtro-pu">Trocar</label>
                            </div>
                        </div>
                        <div id="campos-filtro-pu" class="campos-troca" style="display: none;">
                            <div class="row g-2">
                                <div class="col-6">
                                    <div class="campo-troca">
                                        <label><i class="fas fa-calendar-alt me-1"></i> Data da Troca</label>
                                        <input type="date" id="data-filtro-pu" class="data-troca">
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="campo-troca">
                                        <label><i class="fas fa-tachometer-alt me-1"></i> Km da Troca</label>
                                        <input type="number" id="km-filtro-pu" class="km-troca" placeholder="km">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 mt-3">
                        <i class="fas fa-save me-2"></i>Registrar Manutenção
                    </button>
                </form>
            </div>
        </div>

        <!-- Histórico de Manutenções -->
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-3">
                <h6 class="card-title text-primary fw-semibold mb-3">
                    <i class="fas fa-history me-2"></i>Histórico de Manutenções
                </h6>
                <div id="manutencoes-list" class="list-manutencoes"></div>
            </div>
        </div>
    </template>

    <!-- Template Tela Abastecimento -->
    <template id="template-tela-abastecimento">
        <div class="text-center py-5">
            <div class="bg-light rounded-circle d-inline-flex p-4 mb-4">
                <i class="fas fa-gas-pump fa-3x text-primary"></i>
            </div>
            <h4 class="fw-bold mb-2">Abastecimento</h4>
            <p class="text-secondary mb-4">Tela em desenvolvimento</p>
            <div class="alert alert-info">
                <i class="fas fa-info-circle me-2"></i>
                Em breve você poderá registrar abastecimentos aqui.
            </div>
        </div>
    </template>

    <!-- Template Gestor -->
    <template id="template-gestor">
        <div class="bg-gradient-primary px-4 py-3 text-white sticky-top">
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center">
                    <img src="imagens/logo.png" alt="Logo" style="width: 32px; height: 32px; object-fit: contain;" class="me-2">
                    <span class="fw-semibold" id="gestor-nome">Gestor</span>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <!-- Badge da tela atual -->
                    <span class="badge bg-white bg-opacity-20 text-white px-3 py-2 rounded-pill" id="tela-atual">
                        <i class="fas fa-chart-bar me-1"></i>Relatórios
                    </span>
                    <!-- Menu de 3 pontinhos -->
                    <div class="dropdown">
                        <button class="btn btn-sm bg-opacity-20 border-0 text-white" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="fas fa-ellipsis-vertical fs-5"></i>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end" id="menu-opcoes">
                            <!-- Itens serão inseridos via JavaScript -->
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    
        <!-- Container das telas -->
        <div id="tela-container" class="px-3 py-3">
            <!-- O conteúdo será carregado aqui dinamicamente -->
        </div>
    </template>

    <!-- Template Modal Mapa -->
    <template id="template-modal-mapa">
        <div class="modal fade" id="map-modal" tabindex="-1" data-bs-backdrop="static">
            <div class="modal-dialog modal-fullscreen">
                <div class="modal-content">
                    <div class="modal-header bg-primary text-white py-2">
                        <h6 class="modal-title" id="map-modal-title">
                            <i class="fas fa-map-marked-alt me-2"></i>Selecione no mapa
                        </h6>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body p-0">
                        <div id="map" style="height: 100%; width: 100%;"></div>
                    </div>
                    <div class="modal-footer py-2">
                        <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn btn-sm btn-primary" id="confirm-map-location">
                            <i class="fas fa-check me-2"></i>Confirmar
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-check-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script/0_config_firebaseprod.js"></script>
    <script src="script/index.js"></script>
    <script src="script/manutencao.js"></script>
</body>
</html>
