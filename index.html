<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>FrotaTrack</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/custom.css">
</head>
<body>

    <div id="app"></div>

    <!-- Template Operador -->
    <template id="template-operador">
        <div class="bg-gradient-primary px-4 py-3 text-white sticky-top">
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center">
                    <img src="imagens/logo.png" alt="Logo" style="width: 32px; height: 32px; object-fit: contain;" class="me-2">
                    <span class="fw-semibold" id="operador-nome">Operador</span>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <span class="badge bg-white bg-opacity-20 text-white px-3 py-2 rounded-pill" id="tela-atual">
                        <i class="fas fa-road me-1"></i>Viagens
                    </span>
                    <div class="dropdown">
                        <button class="btn btn-sm bg-opacity-20 border-0 text-white" type="button" data-bs-toggle="dropdown">
                            <i class="fas fa-ellipsis-vertical fs-5"></i>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end" id="menu-opcoes"></ul>
                    </div>
                </div>
            </div>
        </div>
        <div id="tela-container" class="px-3 py-3"></div>
    </template>

    <!-- Template Motorista (compatibilidade) -->
    <template id="template-motorista">
        <div class="bg-gradient-primary px-4 py-3 text-white sticky-top">
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center">
                    <img src="imagens/logo.png" alt="Logo" style="width: 32px; height: 32px; object-fit: contain;" class="me-2">
                    <span class="fw-semibold" id="motorista-nome">Motorista</span>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <span class="badge bg-white bg-opacity-20 text-white px-3 py-2 rounded-pill" id="tela-atual">
                        <i class="fas fa-road me-1"></i>Viagens
                    </span>
                    <div class="dropdown">
                        <button class="btn btn-sm bg-opacity-20 border-0 text-white" type="button" data-bs-toggle="dropdown">
                            <i class="fas fa-ellipsis-vertical fs-5"></i>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end" id="menu-opcoes"></ul>
                    </div>
                </div>
            </div>
        </div>
        <div id="tela-container" class="px-3 py-3"></div>
    </template>

    <!-- Template Gestor -->
    <template id="template-gestor">
        <div class="bg-gradient-primary px-4 py-3 text-white sticky-top">
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center">
                    <img src="imagens/logo.png" alt="Logo" style="width: 32px; height: 32px; object-fit: contain;" class="me-2">
                    <span class="fw-semibold" id="gestor-nome">Gestor</span>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <span class="badge bg-white bg-opacity-20 text-white px-3 py-2 rounded-pill" id="tela-atual">
                        <i class="fas fa-chart-bar me-1"></i>Relatórios
                    </span>
                    <div class="dropdown">
                        <button class="btn btn-sm bg-opacity-20 border-0 text-white" type="button" data-bs-toggle="dropdown">
                            <i class="fas fa-ellipsis-vertical fs-5"></i>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end" id="menu-opcoes"></ul>
                    </div>
                </div>
            </div>
        </div>
        <div id="tela-container" class="px-3 py-3"></div>
    </template>

    <!-- Templates de Telas (todos dentro de <template>) -->
    <template id="template-tela-viagens">
        <div class="alert alert-warning d-flex align-items-center small py-2 mb-3" id="gps-status">
            <i class="fas fa-satellite-dish me-2"></i><span>Aguardando GPS...</span>
        </div>
        <div class="card border-0 shadow-sm rounded-4 mb-3">
            <div class="card-body p-3">
                <h6 class="card-title text-primary fw-semibold mb-3"><i class="fas fa-plus-circle me-2"></i>Novo Frete</h6>
                <form id="frete-form">
                    <div class="mb-2">
                        <div class="d-flex align-items-center gap-1 mb-1">
                            <label class="form-label small text-secondary mb-0">ONDE ESTOU</label>
                            <i class="fas fa-question-circle text-primary small" data-bs-toggle="popover" data-bs-trigger="click" data-bs-title="Localização Atual" data-bs-content="Sua localização atual obtida automaticamente pelo GPS."></i>
                        </div>
                        <div class="d-flex gap-2">
                            <input type="text" class="form-control form-control-sm bg-light" id="origem" readonly>
                            <button type="button" class="btn btn-outline-primary btn-sm" id="view-origem-map"><i class="fas fa-map"></i></button>
                        </div>
                    </div>
                    <div class="input-highlight mb-2">
                        <label>CARREGAR</label>
                        <div class="d-flex gap-2">
                            <input type="text" id="partida" placeholder="Endereço de carregamento" required>
                            <button class="btn btn-outline-secondary" type="button" id="search-partida"><i class="fas fa-search"></i></button>
                        </div>
                    </div>
                    <div class="input-highlight mb-3">
                        <label>DESCARREGAR</label>
                        <div class="d-flex gap-2">
                            <input type="text" id="entrega" placeholder="Endereço de descarregamento" required>
                            <button class="btn btn-outline-secondary" type="button" id="search-entrega"><i class="fas fa-search"></i></button>
                        </div>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <div class="input-highlight">
                                <label>TONELADAS (t)</label>
                                <input type="number" id="peso" placeholder="Ex: 5.5" step="0.1" min="0" required>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="input-highlight">
                                <label>VALOR/t (R$)</label>
                                <input type="number" id="valorPorTonelada" placeholder="Ex: 150" step="0.01" min="0" required>
                            </div>
                        </div>
                    </div>
                    <div class="bg-light rounded-3 p-2 mb-3">
                        <div class="trecho-item first">
                            <div class="trecho-header"><i class="fas fa-circle"></i><span>1° TRECHO (Onde Estou → Carregar)</span></div>
                            <div class="trecho-valores">
                                <div class="trecho-valor-item"><div class="label"><i class="fas fa-road"></i>Distância</div><div class="value"><span id="distancia_trecho1">0</span> <small>km</small></div></div>
                                <div class="trecho-valor-item"><div class="label"><i class="fas fa-dollar-sign"></i>Valor</div><div class="value"><span id="valor_trecho1">R$ 0,00</span></div></div>
                            </div>
                        </div>
                        <div class="trecho-divider"></div>
                        <div class="trecho-item second">
                            <div class="trecho-header"><i class="fas fa-circle"></i><span>2° TRECHO (Carregar → Descarregar)</span></div>
                            <div class="trecho-valores">
                                <div class="trecho-valor-item"><div class="label"><i class="fas fa-road"></i>Distância</div><div class="value"><span id="distancia_trecho2">0</span> <small>km</small></div></div>
                                <div class="trecho-valor-item"><div class="label"><i class="fas fa-dollar-sign"></i>Valor</div><div class="value"><span id="valor_trecho2">R$ 0,00</span></div></div>
                            </div>
                        </div>
                        <div class="totais-container mt-3">
                            <div class="totais-grid">
                                <div class="total-item"><div class="label"><i class="fas fa-road"></i>Distância Total</div><div class="value"><span id="distancia_total">0</span> <small>km</small></div></div>
                                <div class="total-item"><div class="label"><i class="fas fa-gas-pump"></i>Combustível</div><div class="value"><span id="combustivel">0</span> <small>L</small></div></div>
                            </div>
                            <div class="valor-total-destaque"><span class="label"><i class="fas fa-calculator"></i>VALOR TOTAL</span><span class="valor" id="valorTotal">R$ 0,00</span></div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2"><i class="fas fa-save me-2"></i>Salvar Frete</button>
                </form>
            </div>
        </div>
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-3">
                <h6 class="card-title text-primary fw-semibold mb-3"><i class="fas fa-list me-2"></i>Meus Fretes</h6>
                <div id="fretes-list" class="list-fretes"></div>
            </div>
        </div>
    </template>

    <template id="template-tela-manutencao">
        <div class="mb-3">
            <div class="alert alert-info d-flex align-items-center small py-2 mb-3"><i class="fas fa-clipboard-list me-2"></i><span>Registre as manutenções realizadas no veículo</span></div>
        </div>
        <div class="card border-0 shadow-sm rounded-4 mb-3">
            <div class="card-body p-3">
                <h6 class="card-title text-primary fw-semibold mb-3"><i class="fas fa-tools me-2"></i>Registrar Manutenção</h6>
                <form id="manutencao-form">
                    <div class="input-highlight mb-3">
                        <label><i class="fas fa-calendar-alt me-1"></i> DATA DA MANUTENÇÃO</label>
                        <input type="date" id="data-manutencao" required>
                    </div>
                    <div class="input-highlight mb-3">
                        <label><i class="fas fa-tachometer-alt me-1"></i> QUILOMETRAGEM (km)</label>
                        <input type="number" id="km-manutencao" placeholder="Ex: 45.230" step="1" min="0" required>
                    </div>
                    <div class="border-bottom my-3"></div>
                    <h6 class="text-secondary fw-semibold mb-3"><i class="fas fa-oil-can me-2"></i>Óleos</h6>
                    
                    <div class="manutencao-item mb-3">
                        <div class="d-flex align-items-center justify-content-between mb-2">
                            <div class="d-flex align-items-center gap-2"><i class="fas fa-oil-can text-primary"></i><strong>Óleo do Motor</strong></div>
                            <div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="troca-oleo-motor"><label class="form-check-label small" for="troca-oleo-motor">Trocar</label></div>
                        </div>
                        <div id="campos-oleo-motor" class="campos-troca" style="display: none;">
                            <div class="row g-2"><div class="col-6"><div class="campo-troca"><label><i class="fas fa-calendar-alt me-1"></i> Data</label><input type="date" id="data-oleo-motor"></div></div><div class="col-6"><div class="campo-troca"><label><i class="fas fa-tachometer-alt me-1"></i> Km</label><input type="number" id="km-oleo-motor" placeholder="km"></div></div></div>
                        </div>
                    </div>
                    
                    <div class="manutencao-item mb-3">
                        <div class="d-flex align-items-center justify-content-between mb-2">
                            <div class="d-flex align-items-center gap-2"><i class="fas fa-cogs text-primary"></i><strong>Óleo do Câmbio</strong></div>
                            <div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="troca-oleo-cambio"><label class="form-check-label small" for="troca-oleo-cambio">Trocar</label></div>
                        </div>
                        <div id="campos-oleo-cambio" class="campos-troca" style="display: none;">
                            <div class="row g-2"><div class="col-6"><div class="campo-troca"><label><i class="fas fa-calendar-alt me-1"></i> Data</label><input type="date" id="data-oleo-cambio"></div></div><div class="col-6"><div class="campo-troca"><label><i class="fas fa-tachometer-alt me-1"></i> Km</label><input type="number" id="km-oleo-cambio" placeholder="km"></div></div></div>
                        </div>
                    </div>
                    
                    <div class="manutencao-item mb-3">
                        <div class="d-flex align-items-center justify-content-between mb-2">
                            <div class="d-flex align-items-center gap-2"><i class="fas fa-differential text-primary"></i><strong>Óleo do Diferencial</strong></div>
                            <div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="troca-oleo-diferencial"><label class="form-check-label small" for="troca-oleo-diferencial">Trocar</label></div>
                        </div>
                        <div id="campos-oleo-diferencial" class="campos-troca" style="display: none;">
                            <div class="row g-2"><div class="col-6"><div class="campo-troca"><label><i class="fas fa-calendar-alt me-1"></i> Data</label><input type="date" id="data-oleo-diferencial"></div></div><div class="col-6"><div class="campo-troca"><label><i class="fas fa-tachometer-alt me-1"></i> Km</label><input type="number" id="km-oleo-diferencial" placeholder="km"></div></div></div>
                        </div>
                    </div>
                    
                    <div class="border-bottom my-3"></div>
                    <h6 class="text-secondary fw-semibold mb-3"><i class="fas fa-filter me-2"></i>Filtros</h6>
                    
                    <div class="manutencao-item mb-3">
                        <div class="d-flex align-items-center justify-content-between mb-2">
                            <div class="d-flex align-items-center gap-2"><i class="fas fa-oil-can text-primary"></i><strong>Filtro do Motor</strong></div>
                            <div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="troca-filtro-motor"><label class="form-check-label small" for="troca-filtro-motor">Trocar</label></div>
                        </div>
                        <div id="campos-filtro-motor" class="campos-troca" style="display: none;">
                            <div class="row g-2"><div class="col-6"><div class="campo-troca"><label><i class="fas fa-calendar-alt me-1"></i> Data</label><input type="date" id="data-filtro-motor"></div></div><div class="col-6"><div class="campo-troca"><label><i class="fas fa-tachometer-alt me-1"></i> Km</label><input type="number" id="km-filtro-motor" placeholder="km"></div></div></div>
                        </div>
                    </div>
                    
                    <div class="manutencao-item mb-3">
                        <div class="d-flex align-items-center justify-content-between mb-2">
                            <div class="d-flex align-items-center gap-2"><i class="fas fa-gas-pump text-primary"></i><strong>Filtro do Diesel</strong></div>
                            <div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="troca-filtro-diesel"><label class="form-check-label small" for="troca-filtro-diesel">Trocar</label></div>
                        </div>
                        <div id="campos-filtro-diesel" class="campos-troca" style="display: none;">
                            <div class="row g-2"><div class="col-6"><div class="campo-troca"><label><i class="fas fa-calendar-alt me-1"></i> Data</label><input type="date" id="data-filtro-diesel"></div></div><div class="col-6"><div class="campo-troca"><label><i class="fas fa-tachometer-alt me-1"></i> Km</label><input type="number" id="km-filtro-diesel" placeholder="km"></div></div></div>
                        </div>
                    </div>
                    
                    <div class="manutencao-item mb-3">
                        <div class="d-flex align-items-center justify-content-between mb-2">
                            <div class="d-flex align-items-center gap-2"><i class="fas fa-wind text-primary"></i><strong>Filtro de Ar</strong></div>
                            <div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="troca-filtro-ar"><label class="form-check-label small" for="troca-filtro-ar">Trocar</label></div>
                        </div>
                        <div id="campos-filtro-ar" class="campos-troca" style="display: none;">
                            <div class="row g-2"><div class="col-6"><div class="campo-troca"><label><i class="fas fa-calendar-alt me-1"></i> Data</label><input type="date" id="data-filtro-ar"></div></div><div class="col-6"><div class="campo-troca"><label><i class="fas fa-tachometer-alt me-1"></i> Km</label><input type="number" id="km-filtro-ar" placeholder="km"></div></div></div>
                        </div>
                    </div>
                    
                    <div class="manutencao-item mb-3">
                        <div class="d-flex align-items-center justify-content-between mb-2">
                            <div class="d-flex align-items-center gap-2"><i class="fas fa-filter text-primary"></i><strong>Filtro P.U.</strong></div>
                            <div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="troca-filtro-pu"><label class="form-check-label small" for="troca-filtro-pu">Trocar</label></div>
                        </div>
                        <div id="campos-filtro-pu" class="campos-troca" style="display: none;">
                            <div class="row g-2"><div class="col-6"><div class="campo-troca"><label><i class="fas fa-calendar-alt me-1"></i> Data</label><input type="date" id="data-filtro-pu"></div></div><div class="col-6"><div class="campo-troca"><label><i class="fas fa-tachometer-alt me-1"></i> Km</label><input type="number" id="km-filtro-pu" placeholder="km"></div></div></div>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-2 mt-3"><i class="fas fa-save me-2"></i>Registrar Manutenção</button>
                </form>
            </div>
        </div>
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-3">
                <h6 class="card-title text-primary fw-semibold mb-3"><i class="fas fa-history me-2"></i>Histórico de Manutenções</h6>
                <div id="manutencoes-list" class="list-manutencoes"></div>
            </div>
        </div>
    </template>

    <template id="template-tela-abastecimento">
        <div class="text-center py-5">
            <div class="bg-light rounded-circle d-inline-flex p-4 mb-4"><i class="fas fa-gas-pump fa-3x text-primary"></i></div>
            <h4 class="fw-bold mb-2">Abastecimento</h4>
            <p class="text-secondary mb-4">Tela em desenvolvimento</p>
        </div>
    </template>

    <template id="template-tela-relatorios">
        <div class="row g-2 mb-3">
            <div class="col-6"><div class="card bg-primary text-white border-0 shadow-sm rounded-4"><div class="card-body p-3"><small class="opacity-75 d-block">Fretes</small><h4 class="mb-0" id="total-fretes">0</h4></div></div></div>
            <div class="col-6"><div class="card bg-dark text-white border-0 shadow-sm rounded-4"><div class="card-body p-3"><small class="opacity-75 d-block">KM Total</small><h4 class="mb-0" id="total-km">0</h4></div></div></div>
            <div class="col-6"><div class="card bg-primary text-white border-0 shadow-sm rounded-4"><div class="card-body p-3"><small class="opacity-75 d-block">Peso Total</small><h4 class="mb-0" id="total-peso">0 kg</h4></div></div></div>
            <div class="col-6"><div class="card bg-dark text-white border-0 shadow-sm rounded-4"><div class="card-body p-3"><small class="opacity-75 d-block">Combustível</small><h4 class="mb-0" id="total-combustivel">0 L</h4></div></div></div>
        </div>
        <div class="mb-3"><input type="text" class="form-control form-control-sm" id="filter-motorista" placeholder="Buscar motorista..."></div>
        <div class="card border-0 shadow-sm rounded-4"><div class="card-body p-3"><h6 class="card-title text-primary fw-semibold mb-3"><i class="fas fa-clipboard-list me-2"></i>Fretes</h6><div id="todos-fretes-list" class="list-fretes"></div></div></div>
    </template>

    <template id="template-tela-cadastros">
        <div class="text-center py-5">
            <div class="bg-light rounded-circle d-inline-flex p-4 mb-4"><i class="fas fa-address-card fa-3x text-primary"></i></div>
            <h4 class="fw-bold mb-2">Gestão de Cadastros</h4>
            <p class="text-secondary mb-4">Tela em desenvolvimento</p>
        </div>
    </template>

    <template id="template-tela-custos">
        <div class="text-center py-5">
            <div class="bg-light rounded-circle d-inline-flex p-4 mb-4"><i class="fas fa-coins fa-3x text-primary"></i></div>
            <h4 class="fw-bold mb-2">Custos Fixos</h4>
            <p class="text-secondary mb-4">Tela em desenvolvimento</p>
        </div>
    </template>

    <template id="template-tela-gerenciar-usuarios">
        <div class="text-center py-5">
            <div class="bg-light rounded-circle d-inline-flex p-4 mb-4"><i class="fas fa-users fa-3x text-primary"></i></div>
            <h4 class="fw-bold mb-2">Gerenciar Usuários</h4>
            <p class="text-secondary mb-4">Tela em desenvolvimento</p>
        </div>
    </template>

    <!-- Template Modal Mapa -->
    <template id="template-modal-mapa">
        <div class="modal fade" id="map-modal" tabindex="-1" data-bs-backdrop="static">
            <div class="modal-dialog modal-fullscreen">
                <div class="modal-content">
                    <div class="modal-header bg-primary text-white py-2">
                        <h6 class="modal-title" id="map-modal-title"><i class="fas fa-map-marked-alt me-2"></i>Selecione no mapa</h6>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body p-0"><div id="map" style="height: 100%; width: 100%;"></div></div>
                    <div class="modal-footer py-2">
                        <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn btn-sm btn-primary" id="confirm-map-location"><i class="fas fa-check me-2"></i>Confirmar</button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-check-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script/0_config_firebaseprod.js"></script>
    <script src="script/index.js"></script>
    <script src="script/viagens.js"></script>
    <script src="script/manutencao.js"></script>
    <script src="script/abastecimento.js"></script>
    <script src="script/relatorios.js"></script>
    <script src="script/cadastros.js"></script>
    <script src="script/custos_fixos.js"></script>
</body>
</html>
