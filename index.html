<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>FrotaTrack</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- CSS customizado -->
    <link rel="stylesheet" href="css/custom.css">
</head>
<body>

    <div id="app"></div>

    <!-- Template Motorista -->
    <template id="template-motorista">
        <!-- Header simplificado -->
        <div class="bg-gradient-primary px-4 py-3 text-white sticky-top">
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center">
                    <img src="imagens/logo.png" alt="Logo" style="width: 32px; height: 32px; object-fit: contain;" class="me-2">
                    <span class="fw-semibold" id="motorista-nome">Motorista</span>
                </div>
                <button class="btn btn-sm bg-opacity-20 border-0 text-white" id="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>

        <div class="px-3 py-3">
            <!-- GPS Status -->
            <div class="alert alert-warning d-flex align-items-center small py-2 mb-3" id="gps-status" role="alert">
                <i class="fas fa-satellite-dish me-2"></i>
                <span>Aguardando GPS...</span>
            </div>

            <!-- Card Novo Frete -->
            <div class="card border-0 shadow-sm rounded-4 mb-3">
                <div class="card-body p-3">
                    <h6 class="card-title text-primary fw-semibold mb-3">
                        <i class="fas fa-plus-circle me-2"></i>Novo Frete
                    </h6>
                    
                    <form id="frete-form">
                        <!-- Localização atual (mantido) -->
                        <div class="mb-2">
                            <div class="d-flex align-items-center gap-1 mb-1">
                                <label class="form-label small text-secondary mb-0">ONDE ESTOU</label>
                                <i class="fas fa-question-circle text-primary small" 
                                data-bs-toggle="popover"
                                data-bs-trigger="click"
                                data-bs-placement="top"
                                data-bs-title="Localização Atual"
                                data-bs-content="Sua localização atual obtida automaticamente pelo GPS."></i>
                            </div>
                            <div class="d-flex gap-2">
                                <input type="text" class="form-control form-control-sm bg-light" id="origem" readonly>
                                <button type="button" class="btn btn-outline-primary btn-sm" id="view-origem-map">
                                    <i class="fas fa-map"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Carregamento -->
                        <div class="mb-2">
                            <label class="form-label small text-secondary">CARREGAR</label>
                            <div class="input-group input-group-sm">
                                <input type="text" class="form-control" id="partida" placeholder="Endereço de carregamento" required>
                                <button class="btn btn-outline-secondary" type="button" id="search-partida">
                                    <i class="fas fa-search"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Descarregamento -->
                        <div class="mb-3">
                            <label class="form-label small text-secondary">DESCARREGAR</label>
                            <div class="input-group input-group-sm">
                                <input type="text" class="form-control" id="entrega" placeholder="Endereço de descarregamento" required>
                                <button class="btn btn-outline-secondary" type="button" id="search-entrega">
                                    <i class="fas fa-search"></i>
                                </button>
                            </div>
                        </div>

                        <!-- NOVOS CAMPOS: Toneladas e Valor por Tonelada -->
                        <div class="row g-2 mb-3">
                            <div class="col-6">
                                <div class="d-flex align-items-center gap-1 mb-1">
                                    <label class="form-label small text-secondary mb-0">TONELADAS (t)</label>
                                    <i class="fas fa-question-circle text-primary small" 
                                    data-bs-toggle="popover"
                                    data-bs-trigger="click"
                                    data-bs-placement="top"
                                    data-bs-title="Peso da Carga"
                                    data-bs-content="Informe o peso total em toneladas. Ex: 5.5 = 5 toneladas e 500kg"></i>
                                </div>
                                <input type="number" class="form-control form-control-sm" id="peso" 
                                    placeholder="Ex: 5.5" step="0.1" min="0" required>
                            </div>
                            <div class="col-6">
                                <div class="d-flex align-items-center gap-1 mb-1">
                                    <label class="form-label small text-secondary mb-0">VALOR/t (R$)</label>
                                    <i class="fas fa-question-circle text-primary small"
                                    data-bs-toggle="popover"
                                    data-bs-trigger="click"
                                    data-bs-placement="top"
                                    data-bs-title="Valor por Tonelada"
                                    data-bs-content="Valor do frete por tonelada. Ex: 150 = R$150 por tonelada"></i>
                                </div>
                                <input type="number" class="form-control form-control-sm" id="valorPorTonelada" 
                                    placeholder="Ex: 150" step="0.01" min="0" required>
                            </div>
                        </div>

                        <!-- Cálculo automático do valor total -->
                        <div class="bg-light rounded-3 p-2 mb-3">
                            <!-- Primeiro trecho: Onde Estou → Carregar -->
                            <div class="row g-2 mb-2 pb-2 border-bottom">
                                <div class="col-12">
                                    <small class="text-secondary d-block mb-1">
                                        <i class="fas fa-arrow-right text-primary me-1"></i>
                                        1° TRECHO (Onde Estou → Carregar)
                                    </small>
                                </div>
                                <div class="col-6">
                                    <small class="text-secondary d-block">Distância</small>
                                    <span class="fw-semibold" id="distancia_trecho1">0 km</span>
                                </div>
                                <div class="col-6">
                                    <small class="text-secondary d-block">Valor do Trecho</small>
                                    <span class="fw-semibold" id="valor_trecho1">R$ 0,00</span>
                                </div>
                            </div>
                            
                            <!-- Segundo trecho: Carregar → Descarregar -->
                            <div class="row g-2 mb-2 pb-2 border-bottom">
                                <div class="col-12">
                                    <small class="text-secondary d-block mb-1">
                                        <i class="fas fa-arrow-right text-primary me-1"></i>
                                        2° TRECHO (Carregar → Descarregar)
                                    </small>
                                </div>
                                <div class="col-6">
                                    <small class="text-secondary d-block">Distância</small>
                                    <span class="fw-semibold" id="distancia_trecho2">0 km</span>
                                </div>
                                <div class="col-6">
                                    <small class="text-secondary d-block">Valor do Trecho</small>
                                    <span class="fw-semibold" id="valor_trecho2">R$ 0,00</span>
                                </div>
                            </div>
                            
                            <!-- Totais -->
                            <div class="row g-2 mt-2 pt-2 border-top">
                                <div class="col-6">
                                    <small class="text-secondary d-block">
                                        <i class="fas fa-road text-primary me-1"></i>
                                        Distância Total
                                    </small>
                                    <span class="fw-semibold" id="distancia_total">0 km</span>
                                </div>
                                <div class="col-6">
                                    <small class="text-secondary d-block">
                                        <i class="fas fa-gas-pump text-primary me-1"></i>
                                        Combustível
                                    </small>
                                    <span class="fw-semibold" id="combustivel">0 L</span>
                                </div>
                                <div class="col-12 mt-2 pt-2 border-top">
                                    <div class="d-flex justify-content-between align-items-center">
                                        <small class="text-secondary">
                                            <i class="fas fa-dollar-sign text-primary me-1"></i>
                                            VALOR TOTAL DO FRETE
                                        </small>
                                        <span class="fw-bold text-primary" id="valorTotal">R$ 0,00</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2">
                            <i class="fas fa-save me-2"></i>Salvar Frete
                        </button>
                    </form>
                </div>
            </div>

            <!-- Meus Fretes -->
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-3">
                    <h6 class="card-title text-primary fw-semibold mb-3">
                        <i class="fas fa-list me-2"></i>Meus Fretes
                    </h6>
                    <div id="fretes-list" class="list-fretes"></div>
                </div>
            </div>
        </div>
    </template>

    <!-- Template Gestor -->
    <template id="template-gestor">
        <!-- Header Gestor -->
        <div class="bg-gradient-primary px-4 py-3 text-white sticky-top">
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center">
                    <img src="imagens/logo.png" alt="Logo" style="width: 32px; height: 32px; object-fit: contain;" class="me-2">
                    <span class="fw-semibold" id="gestor-nome">Gestor</span>
                </div>
                <button class="btn btn-sm btn-light bg-opacity-20 border-0 text-white" id="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>

        <div class="px-3 py-3">
            <!-- Stats Cards -->
            <div class="row g-2 mb-3">
                <div class="col-6">
                    <div class="card bg-primary text-white border-0 shadow-sm rounded-4">
                        <div class="card-body p-3">
                            <small class="opacity-75 d-block">Fretes</small>
                            <h4 class="mb-0" id="total-fretes">0</h4>
                        </div>
                    </div>
                </div>
                <div class="col-6">
                    <div class="card bg-dark text-white border-0 shadow-sm rounded-4">
                        <div class="card-body p-3">
                            <small class="opacity-75 d-block">KM Total</small>
                            <h4 class="mb-0" id="total-km">0</h4>
                        </div>
                    </div>
                </div>
                <div class="col-6">
                    <div class="card bg-primary text-white border-0 shadow-sm rounded-4">
                        <div class="card-body p-3">
                            <small class="opacity-75 d-block">Peso Total</small>
                            <h4 class="mb-0" id="total-peso">0 kg</h4>
                        </div>
                    </div>
                </div>
                <div class="col-6">
                    <div class="card bg-dark text-white border-0 shadow-sm rounded-4">
                        <div class="card-body p-3">
                            <small class="opacity-75 d-block">Combustível</small>
                            <h4 class="mb-0" id="total-combustivel">0 L</h4>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Filtro simplificado -->
            <div class="mb-3">
                <input type="text" class="form-control form-control-sm" id="filter-motorista" placeholder="Buscar motorista...">
            </div>

            <!-- Todos os Fretes -->
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-3">
                    <h6 class="card-title text-primary fw-semibold mb-3">
                        <i class="fas fa-clipboard-list me-2"></i>Fretes
                    </h6>
                    <div id="todos-fretes-list" class="list-fretes"></div>
                </div>
            </div>
        </div>
    </template>

    <!-- Template Modal Mapa -->
    <template id="template-modal-mapa">
        <div class="modal fade" id="map-modal" tabindex="-1" data-bs-backdrop="static">
            <div class="modal-dialog modal-fullscreen">
                <div class="modal-content">
                    <div class="modal-header bg-primary text-white py-2">
                        <h6 class="modal-title" id="map-modal-title">
                            <i class="fas fa-map-marked-alt me-2"></i>Selecione no mapa
                        </h6>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body p-0">
                        <div id="map" style="height: 100%; width: 100%;"></div>
                    </div>
                    <div class="modal-footer py-2">
                        <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn btn-sm btn-primary" id="confirm-map-location">
                            <i class="fas fa-check me-2"></i>Confirmar
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script/0_config_firebaseprod.js"></script>
    <script src="script/index.js"></script>
</body>
</html>
