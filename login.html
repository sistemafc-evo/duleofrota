<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FrotaTrack - Login</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS customizado -->
    <link rel="stylesheet" href="css/custom.css">
    
    <style>
        .password-toggle { 
            cursor: pointer; 
            transition: opacity 0.2s; 
        }
        .password-toggle:hover { 
            opacity: 0.7; 
        }
        .remember-checkbox { 
            cursor: pointer; 
        }
        .login-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }
        .input-group-text {
            background: transparent;
            border-right: none;
        }
        .form-control {
            border-left: none;
        }
        .form-control:focus {
            border-color: #dee2e6;
            box-shadow: none;
        }
        .input-group:focus-within {
            box-shadow: 0 0 0 0.25rem rgba(65, 88, 208, 0.25);
            border-radius: 0.375rem;
        }
        .input-group:focus-within .input-group-text,
        .input-group:focus-within .form-control {
            border-color: #4158D0;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4158D0 0%, #C850C0 100%);
            border: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(65, 88, 208, 0.3);
        }
        .btn-primary:active {
            transform: translateY(0);
        }
    </style>
</head>
<body class="bg-light">
    <div class="container-fluid px-0 min-vh-100 d-flex flex-column">
        <!-- Header com gradiente -->
        <div class="bg-gradient-primary p-4 text-white">
            <div class="d-flex align-items-center">
                <div class="bg-white bg-opacity-20 rounded-circle p-2 me-3">
                    <img src="imagens/logo.png" alt="Logo" style="width: 40px; height: 40px; object-fit: contain;">
                </div>
                <div>
                    <h1 class="h4 fw-bold mb-0">FrotaTrack</h1>
                    <p class="small opacity-75 mb-0">Gestão de Frotas</p>
                </div>
            </div>
        </div>

        <!-- Conteúdo do Login -->
        <div class="flex-grow-1 d-flex align-items-center justify-content-center p-4">
            <div class="w-100" style="max-width: 360px;">
                <!-- Card de login -->
                <div class="login-card p-4">
                    <div class="text-center mb-4">
                        <div class="bg-light rounded-circle d-inline-flex p-3 mb-3">
                            <i class="fas fa-truck-fast fa-2x text-primary"></i>
                        </div>
                        <h2 class="h5 fw-bold mb-1">Bem-vindo</h2>
                        <p class="small text-secondary mb-0">Acesse sua conta com seu login</p>
                    </div>

                    <form id="login-form">
                        <div class="mb-3">
                            <label class="form-label small text-secondary fw-semibold mb-1">LOGIN</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0">
                                    <i class="fas fa-user text-primary"></i>
                                </span>
                                <input type="text" class="form-control border-start-0 ps-0" 
                                       id="username" 
                                       placeholder="Digite seu login"
                                       autocomplete="username"
                                       autofocus>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small text-secondary fw-semibold mb-1">SENHA</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0">
                                    <i class="fas fa-lock text-primary"></i>
                                </span>
                                <input type="password" class="form-control border-start-0 ps-0" 
                                       id="password" 
                                       placeholder="Digite sua senha"
                                       autocomplete="current-password">
                                <span class="input-group-text bg-transparent border-start-0 password-toggle" id="toggle-password">
                                    <i class="far fa-eye text-primary"></i>
                                </span>
                            </div>
                        </div>

                        <div class="mb-4">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input remember-checkbox" id="remember-login">
                                <label class="form-check-label small text-secondary" for="remember-login">
                                    <i class="far fa-save me-1"></i>Lembrar dados de login
                                </label>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-3 fw-semibold mb-3">
                            <i class="fas fa-arrow-right-to-bracket me-2"></i>Entrar
                        </button>
                    </form>

                    <!-- Aviso de suporte -->
                    <div class="text-center mt-3 pt-2 border-top">
                        <small class="text-muted">
                            <i class="fas fa-shield-alt me-1"></i>
                            Ambiente seguro com autenticação Firebase
                        </small>
                    </div>
                </div>
                
                <!-- Mensagem de ajuda (opcional) -->
                <div class="text-center mt-3">
                    <small class="text-muted">
                        <i class="fas fa-question-circle me-1"></i>
                        Precisa de ajuda? Contate o administrador
                    </small>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts do Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-check-compat.js"></script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Scripts da aplicação -->
    <script src="script/0_config_firebaseprod.js"></script>
    <script src="script/login.js"></script>
</body>
</html>
