<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Duleo Frota - Login</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4158D0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Duleo Frota">
    <link rel="apple-touch-icon" href="/imagens/logo.png">
    <link rel="icon" type="image/x-icon" href="/imagens/icone.ico">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/custom.css">
    
    <style>
        .password-toggle { cursor: pointer; transition: opacity 0.2s; }
        .password-toggle:hover { opacity: 0.7; }
        .remember-checkbox { cursor: pointer; }
        
        /* Rodapé profissional - TUDO NA MESMA LINHA */
        .footer-login {
            margin-top: auto;
            padding: 16px 16px 20px;
            text-align: center;
            border-top: 1px solid rgba(0,0,0,0.05);
            background: #f8f9fa;
        }
        .footer-content {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            row-gap: 8px;
        }
        .footer-logo {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .footer-logo img {
            height: 22px;
            width: auto;
            opacity: 0.8;
        }
        .footer-logo span {
            font-size: 0.7rem;
            font-weight: 500;
            color: #6c757d;
            letter-spacing: 0.5px;
        }
        .footer-divider {
            color: #dee2e6;
            font-size: 0.7rem;
        }
        .footer-copyright {
            font-size: 0.7rem;
            color: #adb5bd;
        }
        .footer-contact {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .footer-contact a {
            color: #6c757d;
            text-decoration: none;
            font-size: 0.7rem;
            transition: color 0.2s;
        }
        .footer-contact a:hover {
            color: #4158D0;
        }
        .footer-contact i {
            font-size: 0.75rem;
        }
        .whatsapp-link {
            color: #25D366 !important;
        }
        .whatsapp-link:hover {
            color: #128C7E !important;
        }
        
        /* Responsivo: em telas muito pequenas, quebra em 2 linhas */
        @media (max-width: 480px) {
            .footer-content {
                flex-direction: column;
                gap: 8px;
            }
            .footer-divider {
                display: none;
            }
        }
    </style>
</head>
<body class="bg-light d-flex flex-column min-vh-100">
    <div class="container-fluid px-0 flex-grow-1 d-flex flex-column">
        <div class="bg-gradient-primary p-4 text-white">
            <div class="d-flex align-items-center">
                <div class="bg-white bg-opacity-20 rounded-circle p-2 me-3">
                    <img src="imagens/logo.png" alt="Logo" style="width: 40px; height: 40px; object-fit: contain;">
                </div>
                <div>
                    <h1 class="h4 fw-bold mb-0">Duleo Frota</h1>
                    <p class="small opacity-75 mb-0">Gestão de Frotas</p>
                </div>
            </div>
        </div>

        <div class="flex-grow-1 d-flex align-items-center justify-content-center p-4">
            <div class="w-100" style="max-width: 320px;">
                <div class="text-center mb-4">
                    <div class="bg-white shadow-sm rounded-circle d-inline-flex p-3 mb-3">
                        <i class="fas fa-user-circle fa-2x text-primary"></i>
                    </div>
                    <h2 class="h5 fw-normal text-secondary">Acesse sua conta</h2>
                </div>

                <form id="login-form">
                    <div class="mb-3">
                        <label class="form-label small text-secondary fw-semibold">LOGIN</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0">
                                <i class="fas fa-user text-primary"></i>
                            </span>
                            <input type="text" class="form-control border-start-0 ps-0" 
                                   id="username" placeholder="Digite seu login" autocomplete="username">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small text-secondary fw-semibold">SENHA</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0">
                                <i class="fas fa-lock text-primary"></i>
                            </span>
                            <input type="password" class="form-control border-start-0 ps-0" 
                                   id="password" placeholder="Digite sua senha" autocomplete="current-password">
                            <span class="input-group-text bg-transparent border-start-0 password-toggle" id="toggle-password">
                                <i class="far fa-eye text-primary"></i>
                            </span>
                        </div>
                    </div>

                    <div class="mb-4">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input remember-checkbox" id="remember-login">
                            <label class="form-check-label small text-secondary" for="remember-login">
                                <i class="far fa-save me-1"></i>Lembrar dados de login
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-3 fw-semibold">
                        <i class="fas fa-arrow-right-to-bracket me-2"></i>Entrar
                    </button>
                </form>
            </div>
        </div>

        <!-- RODAPÉ PROFISSIONAL - SEM E-MAIL -->
        <div class="footer-login">
            <div class="footer-content">
                <!-- Logo + Nome -->
                <div class="footer-logo">
                    <img src="imagens/logo_evo.png" alt="EVOTL" onerror="this.style.display='none'">
                    <span>EVOTL</span>
                </div>
                
                <span class="footer-divider">|</span>
                
                <!-- Copyright -->
                <div class="footer-copyright">
                    © 2025
                </div>
                
                <span class="footer-divider">|</span>
                
                <!-- WhatsApp com contato direto -->
                <div class="footer-contact">
                    <i class="fab fa-whatsapp" style="color: #25D366;"></i>
                    <a href="https://wa.me/5571985101828" target="_blank" class="whatsapp-link">
                        (71) 98510-1828
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts do Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-check-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script/0_config_firebaseprod.js"></script>
    <script src="script/login.js"></script>
</body>
</html>
