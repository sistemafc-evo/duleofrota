<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FrotaTrack - Login</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS customizado -->
    <link rel="stylesheet" href="css/custom.css">
</head>
<body class="bg-light">
    <div class="container-fluid px-0 min-vh-100 d-flex flex-column">
        <!-- Header com gradiente -->
        <div class="bg-gradient-primary p-4 text-white">
            <div class="d-flex align-items-center">
                <div class="bg-white bg-opacity-20 rounded-circle p-2 me-3">
                    <img src="imagens/logo.png" alt="Logo" style="width: 40px; height: 40px; object-fit: contain;">
                </div>
                <div>
                    <h1 class="h4 fw-bold mb-0">FrotaTrack</h1>
                    <p class="small opacity-75 mb-0">Gestão de Frotas</p>
                </div>
            </div>
        </div>

        <!-- Conteúdo do Login -->
        <div class="flex-grow-1 d-flex align-items-center justify-content-center p-4">
            <div class="w-100" style="max-width: 320px;">
                <!-- Card de login simplificado -->
                <div class="text-center mb-4">
                    <div class="bg-white shadow-sm rounded-circle d-inline-flex p-3 mb-3">
                        <i class="fas fa-user-circle fa-2x text-primary"></i>
                    </div>
                    <h2 class="h5 fw-normal text-secondary">Acesse sua conta</h2>
                </div>

                <form id="login-form">
                    <div class="mb-3">
                        <label class="form-label small text-secondary fw-semibold">USUÁRIO</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0">
                                <i class="fas fa-user text-primary"></i>
                            </span>
                            <input type="text" class="form-control border-start-0 ps-0" 
                                   id="username" value="motorista" placeholder="Seu usuário">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small text-secondary fw-semibold">SENHA</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0">
                                <i class="fas fa-lock text-primary"></i>
                            </span>
                            <input type="password" class="form-control border-start-0 ps-0" 
                                   id="password" value="123" placeholder="Sua senha">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-3 fw-semibold mb-4">
                        <i class="fas fa-arrow-right-to-bracket me-2"></i>Entrar
                    </button>

                    <!-- Info de acesso em cards compactos -->
                    <div class="row g-2">
                        <div class="col-6">
                            <div class="card bg-light border-0 rounded-4">
                                <div class="card-body p-3">
                                    <div class="small text-secondary mb-1">Motorista</div>
                                    <div class="fw-bold">motorista</div>
                                    <div class="small text-muted">••• 123</div>
                                </div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="card bg-light border-0 rounded-4">
                                <div class="card-body p-3">
                                    <div class="small text-secondary mb-1">Gestor</div>
                                    <div class="fw-bold">gestor</div>
                                    <div class="small text-muted">••• 123</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script/login.js"></script>
</body>
</html>
