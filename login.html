<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Duleo Frota - Login</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4158D0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Duleo Frota">
    <link rel="apple-touch-icon" href="/imagens/logo.png">
    <link rel="icon" type="image/x-icon" href="/imagens/icone.ico">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/custom.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
    <div class="container-fluid px-0 flex-grow-1 d-flex flex-column">
        <div class="bg-gradient-primary p-4 text-white">
            <div class="d-flex align-items-center">
                <div class="bg-white bg-opacity-20 rounded-circle p-2 me-3">
                    <img src="imagens/logo.png" alt="Logo" style="width: 40px; height: 40px; object-fit: contain;">
                </div>
                <div>
                    <h1 class="h4 fw-bold mb-0">Duleo Frota</h1>
                    <p class="small opacity-75 mb-0">Gestão de Frotas</p>
                </div>
            </div>
        </div>

        <div class="flex-grow-1 d-flex align-items-center justify-content-center p-4">
            <div class="w-100" style="max-width: 320px;">
                <div class="text-center mb-4">
                    <div class="bg-white shadow-sm rounded-circle d-inline-flex p-2 mb-3 logo-container">
                        <img src="imagens/logo_frota_track.png" alt="Logo" class="logo-frota">
                    </div>
                    <h2 class="h5 fw-normal text-secondary">Acesse sua conta</h2>
                </div>

                <form id="login-form">
                    <div class="mb-3">
                        <label class="form-label small text-secondary fw-semibold">LOGIN</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0">
                                <i class="fas fa-user text-primary"></i>
                            </span>
                            <input type="text" class="form-control border-start-0 ps-0" 
                                   id="username" placeholder="Digite seu login" autocomplete="username">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small text-secondary fw-semibold">SENHA</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0">
                                <i class="fas fa-lock text-primary"></i>
                            </span>
                            <input type="password" class="form-control border-start-0 ps-0" 
                                   id="password" placeholder="Digite sua senha" autocomplete="current-password">
                            <span class="input-group-text bg-transparent border-start-0 password-toggle" id="toggle-password">
                                <i class="far fa-eye text-primary"></i>
                            </span>
                        </div>
                    </div>

                    <div class="mb-4">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input remember-checkbox" id="remember-login">
                            <label class="form-check-label small text-secondary" for="remember-login">
                                <i class="far fa-save me-1"></i>Lembrar dados de login
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-3 fw-semibold">
                        <i class="fas fa-arrow-right-to-bracket me-2"></i>Entrar
                    </button>
                </form>
            </div>
        </div>

        <!-- RODAPÉ PROFISSIONAL -->
        <div class="footer-login">
            <div class="footer-content">
                <!-- Logo clicável -->
                <div class="footer-logo" id="logoEvotechub" style="cursor: pointer;">
                    <img src="imagens/logo_evo.png" alt="EVOTECHUB" onerror="this.style.display='none'">
                </div>
            </div>
        </div>
        
        <!-- Modal -->
        <div id="modalDesenvolvido" class="modal">
            <div class="modal-content">
                <span class="modal-close">&times;</span>
                <div class="modal-body">
                    <p class="modal-nome-dev" id="nomeDev">
                        <strong>Carregando...</strong>
                    </p>
                    <p class="modal-descricao" id="descricaoDev"></p>
                    <p class="modal-local" id="localDev">
                        <i class="fas fa-map-marker-alt" style="color: #ff5722;"></i> 
                        <span>Carregando...</span>
                    </p>
                    <p class="modal-contato" id="whatsappContato">
                        <i class="fab fa-whatsapp" style="color: #25D366;"></i> 
                        <span>Carregando...</span>
                    </p>
                    <p class="modal-versao" id="versaoSistema"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts do Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-check-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script/0_config_firebaseprod.js"></script>
    <script src="script/login.js"></script>
    
    <script>
        // Script do Modal com Firebase
        (function() {
            const logo = document.getElementById('logoEvotechub');
            const modal = document.getElementById('modalDesenvolvido');
            const closeBtn = document.querySelector('.modal-close');
            const whatsappContato = document.getElementById('whatsappContato');
            
            let telefoneDev = '';

            // Abrir modal ao clicar na logo
            if (logo) {
                logo.addEventListener('click', function(e) {
                    modal.style.display = 'block';
                    buscarDadosDesenvolvedor();
                });
            }

            // Fechar modal ao clicar no X
            if (closeBtn) {
                closeBtn.addEventListener('click', function() {
                    modal.style.display = 'none';
                });
            }

            // Fechar modal ao clicar fora do conteúdo
            window.addEventListener('click', function(e) {
                if (e.target === modal) {
                    modal.style.display = 'none';
                }
            });

            // Função para buscar os dados do desenvolvedor no Firebase
            async function buscarDadosDesenvolvedor() {
                const nomeDevElement = document.getElementById('nomeDev');
                const descricaoDevElement = document.getElementById('descricaoDev');
                const localDevElement = document.getElementById('localDev');
                const versaoElement = document.getElementById('versaoSistema');
                const contatoSpan = document.querySelector('#whatsappContato span');
                
                if (!window.db) {
                    if (nomeDevElement) nomeDevElement.innerHTML = '<strong>Carregando...</strong>';
                    if (descricaoDevElement) descricaoDevElement.textContent = 'Aguarde, carregando informações...';
                    if (localDevElement) localDevElement.innerHTML = '<i class="fas fa-map-marker-alt" style="color: #ff5722;"></i> Carregando...';
                    if (contatoSpan) contatoSpan.textContent = 'Carregando...';
                    if (versaoElement) versaoElement.textContent = 'Versão: carregando...';
                    
                    if (window.waitForFirebaseReady) {
                        await window.waitForFirebaseReady();
                    } else {
                        await new Promise(resolve => setTimeout(resolve, 1000));
                    }
                }
                
                if (window.db) {
                    try {
                        const docRef = window.db.collection('config').doc('dados_dev');
                        const docSnap = await docRef.get();
                        
                        if (docSnap.exists) {
                            const dados = docSnap.data();
                            
                            const nomeDev = dados.nome_dev || 'EVOTECHUB';
                            if (nomeDevElement) nomeDevElement.innerHTML = `<strong>${nomeDev}</strong>`;
                            
                            const descricaoDev = dados.descricao_dev || 'Especializada em automações de processos e desenvolvimento de sites, aplicativos e programas.';
                            if (descricaoDevElement) descricaoDevElement.textContent = descricaoDev;
                            
                            const localDev = dados.local_dev || 'Salvador BA';
                            if (localDevElement) localDevElement.innerHTML = `<i class="fas fa-map-marker-alt" style="color: #ff5722;"></i> ${localDev}`;
                            
                            telefoneDev = dados.telefone_dev || '71985101828';
                            if (contatoSpan) {
                                const telefoneFormatado = formatarTelefone(telefoneDev);
                                contatoSpan.textContent = `CONTATO: ${telefoneFormatado}`;
                            }
                            
                            if (whatsappContato) {
                                whatsappContato.removeEventListener('click', redirecionarWhatsApp);
                                whatsappContato.addEventListener('click', redirecionarWhatsApp);
                            }
                            
                            const versao = dados.versao;
                            if (versaoElement) {
                                if (versao !== undefined && versao !== null) {
                                    versaoElement.textContent = `Versão: ${versao}`;
                                } else {
                                    versaoElement.textContent = 'Versão: 0.1';
                                }
                            }
                        } else {
                            if (nomeDevElement) nomeDevElement.innerHTML = '<strong>EVOTECHUB</strong>';
                            if (descricaoDevElement) descricaoDevElement.textContent = 'Especializada em automações de processos e desenvolvimento de sites, aplicativos e programas.';
                            if (localDevElement) localDevElement.innerHTML = '<i class="fas fa-map-marker-alt" style="color: #ff5722;"></i> Salvador BA';
                            if (contatoSpan) contatoSpan.textContent = 'CONTATO: (71) 98510-1828';
                            if (versaoElement) versaoElement.textContent = 'Versão: 0.1';
                            telefoneDev = '71985101828';
                        }
                    } catch (error) {
                        if (nomeDevElement) nomeDevElement.innerHTML = '<strong>EVOTECHUB</strong>';
                        if (descricaoDevElement) descricaoDevElement.textContent = 'Especializada em automações de processos e desenvolvimento de sites, aplicativos e programas.';
                        if (localDevElement) localDevElement.innerHTML = '<i class="fas fa-map-marker-alt" style="color: #ff5722;"></i> Salvador BA';
                        if (contatoSpan) contatoSpan.textContent = 'CONTATO: (71) 98510-1828';
                        if (versaoElement) versaoElement.textContent = 'Versão: 0.1';
                        telefoneDev = '71985101828';
                    }
                } else {
                    if (nomeDevElement) nomeDevElement.innerHTML = '<strong>EVOTECHUB</strong>';
                    if (descricaoDevElement) descricaoDevElement.textContent = 'Especializada em automações de processos e desenvolvimento de sites, aplicativos e programas.';
                    if (localDevElement) localDevElement.innerHTML = '<i class="fas fa-map-marker-alt" style="color: #ff5722;"></i> Salvador BA';
                    if (contatoSpan) contatoSpan.textContent = 'CONTATO: (71) 98510-1828';
                    if (versaoElement) versaoElement.textContent = 'Versão: 0.1';
                    telefoneDev = '71985101828';
                }
            }
            
            function redirecionarWhatsApp() {
                const telefoneLimpo = telefoneDev.replace(/\D/g, '');
                const numeroWhatsApp = `55${telefoneLimpo}`;
                window.open(`https://wa.me/${numeroWhatsApp}`, '_blank');
            }
            
            function formatarTelefone(telefone) {
                const numeros = telefone.replace(/\D/g, '');
                if (numeros.length === 11) {
                    return `(${numeros.substring(0,2)}) ${numeros.substring(2,7)}-${numeros.substring(7,11)}`;
                } else if (numeros.length === 10) {
                    return `(${numeros.substring(0,2)}) ${numeros.substring(2,6)}-${numeros.substring(6,10)}`;
                }
                return telefone;
            }
        })();
    </script>
</body>
</html>
