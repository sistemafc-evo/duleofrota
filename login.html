<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrotaTrack - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="icon" type="image/x-icon" href="imagens/icone.ico">
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="imagens/logo.png" alt="FrotaTrack" style="width: 80px; height: 80px;">
            <h1>FrotaTrack</h1>
        </div>
        <div class="login-form">
            <h2>Acesso ao Sistema</h2>
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="username" placeholder="Usuário" value="motorista">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Senha" value="123">
            </div>
            <button id="login-btn" class="btn-primary">Entrar</button>
            <div class="login-info">
                <p><strong>Motorista:</strong> motorista / 123</p>
                <p><strong>Gestor:</strong> gestor / 123</p>
            </div>
        </div>
    </div>

    <script src="script/login.js"></script>
</body>
</html>
